<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>—</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #171717;
            --surface2: #1f1f1f;
            --text: #e0e0e0;
            --text2: #888;
            --accent: #c9a96e;
            --accent-dim: #4a3f2f;
            --danger: #5c2a2a;
            --radius: 14px;
            --radius-sm: 10px;
            --font: 'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .app {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Auth screen */
        .screen { display: none; flex-direction: column; gap: 20px; }
        .screen.active { display: flex; }

        .icon-lock {
            font-size: 42px;
            text-align: center;
            opacity: 0.5;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: -0.3px;
            text-align: center;
            color: var(--text);
        }

        .subtitle {
            font-size: 13px;
            color: var(--text2);
            text-align: center;
            line-height: 1.5;
        }

        input {
            background: var(--surface);
            border: 1px solid transparent;
            color: var(--text);
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-family: var(--font);
            outline: none;
            transition: all 0.2s;
            width: 100%;
        }
        input:focus {
            border-color: var(--accent-dim);
            background: var(--surface2);
        }
        input::placeholder { color: #555; }

        button {
            background: var(--surface);
            color: var(--text);
            border: 1px solid #2a2a2a;
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-family: var(--font);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: -0.2px;
            width: 100%;
        }
        button:active { transform: scale(0.98); }
        button.primary {
            background: var(--accent);
            color: #0d0d0d;
            border: none;
            font-weight: 600;
        }
        button.primary:active { opacity: 0.85; }
        button.ghost {
            background: transparent;
            border: 1px solid #2a2a2a;
            font-size: 13px;
            padding: 10px 16px;
        }
        button.danger {
            background: transparent;
            border: 1px solid #4a2020;
            color: #c97a7a;
            font-size: 13px;
            padding: 10px 16px;
        }

        .error-msg {
            font-size: 12px;
            color: #c97a7a;
            text-align: center;
            min-height: 16px;
            transition: opacity 0.3s;
        }

        /* Main screen */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .week-nav {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .week-label {
            font-size: 18px;
            font-weight: 500;
            min-width: 110px;
            text-align: center;
            letter-spacing: -0.3px;
        }
        .nav-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid #2a2a2a;
            color: var(--text);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: all 0.2s;
        }
        .nav-btn:active { background: var(--surface2); }

        .events-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 50vh;
            overflow-y: auto;
            padding-right: 4px;
        }
        .events-list::-webkit-scrollbar { width: 3px; }
        .events-list::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        .event-card {
            background: var(--surface);
            border: 1px solid #222;
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: all 0.2s;
            position: relative;
        }
        .event-card:active { border-color: #333; }
        .event-date {
            font-size: 11px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
        .event-title {
            font-size: 15px;
            font-weight: 500;
        }
        .event-desc {
            font-size: 13px;
            color: var(--text2);
            line-height: 1.4;
        }
        .event-delete {
            position: absolute;
            top: 10px;
            right: 12px;
            background: none;
            border: none;
            color: #555;
            font-size: 16px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .event-delete:active { color: #c97a7a; background: var(--danger); }

        .empty-state {
            text-align: center;
            color: #444;
            padding: 40px 20px;
            font-size: 14px;
            line-height: 1.6;
        }
        .empty-state .emoji { font-size: 36px; margin-bottom: 8px; }

        /* Bottom actions */
        .bottom-actions {
            display: flex;
            gap: 8px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 100;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface);
            width: 100%;
            max-width: 420px;
            border-radius: var(--radius) var(--radius) 0 0;
            padding: 24px 20px 32px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .modal h2 {
            font-size: 17px;
            font-weight: 500;
        }
        .modal-row {
            display: flex;
            gap: 8px;
        }
        .modal-row input { flex: 1; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface2);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="app">
    <!-- LOGIN SCREEN -->
    <div class="screen active" id="screen-auth">
        <div class="icon-lock">✦</div>
        <h1>Хроника</h1>
        <p class="subtitle">Личный календарь событий.<br>Введите пароль для входа.</p>
        <input type="password" id="password-input" placeholder="Пароль" autocomplete="off">
        <button class="primary" id="btn-unlock">Войти</button>
        <p class="error-msg" id="auth-error"></p>
        <button class="ghost" id="btn-reset" style="display:none;">Сбросить все данные</button>
    </div>

    <!-- MAIN SCREEN -->
    <div class="screen" id="screen-main">
        <div class="header">
            <div class="week-nav">
                <button class="nav-btn" id="btn-prev">‹</button>
                <span class="week-label" id="week-label">2025 · W01</span>
                <button class="nav-btn" id="btn-next">›</button>
            </div>
            <button class="nav-btn" id="btn-today" style="font-size:13px;width:auto;border-radius:20px;padding:6px 14px;">Сегодня</button>
        </div>

        <div class="events-list" id="events-container">
            <div class="empty-state">
                <div class="emoji">📝</div>
                Событий пока нет<br>Добавьте первое
            </div>
        </div>

        <div class="bottom-actions">
            <button class="primary" id="btn-add">+ Событие</button>
            <button class="ghost" id="btn-logout" style="width:auto;">Выйти</button>
        </div>
    </div>
</div>

<!-- ADD EVENT MODAL -->
<div class="modal-overlay" id="modal-add">
    <div class="modal">
        <h2>Новое событие</h2>
        <input type="date" id="event-date" placeholder="Дата">
        <input type="text" id="event-title" placeholder="Заголовок">
        <input type="text" id="event-desc" placeholder="Описание (необязательно)">
        <div class="modal-row">
            <button class="ghost" id="btn-cancel" style="flex:1;">Отмена</button>
            <button class="primary" id="btn-save" style="flex:1;">Сохранить</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    (function() {
        // ─── CONSTANTS ────────────────────────────
        const STORAGE_KEY = 'chronicle_data';
        const SALT = 'chronicle_salt_v1';

        // ─── DOM ──────────────────────────────────
        const screenAuth = document.getElementById('screen-auth');
        const screenMain = document.getElementById('screen-main');
        const passwordInput = document.getElementById('password-input');
        const authError = document.getElementById('auth-error');
        const btnUnlock = document.getElementById('btn-unlock');
        const btnReset = document.getElementById('btn-reset');
        const btnLogout = document.getElementById('btn-logout');
        const weekLabel = document.getElementById('week-label');
        const eventsContainer = document.getElementById('events-container');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnToday = document.getElementById('btn-today');
        const btnAdd = document.getElementById('btn-add');
        const modalAdd = document.getElementById('modal-add');
        const eventDate = document.getElementById('event-date');
        const eventTitle = document.getElementById('event-title');
        const eventDesc = document.getElementById('event-desc');
        const btnSave = document.getElementById('btn-save');
        const btnCancel = document.getElementById('btn-cancel');
        const toast = document.getElementById('toast');

        // ─── STATE ────────────────────────────────
        let masterPassword = null;
        let derivedKey = null;
        let currentMonday = getMonday(new Date());
        let events = {}; // { '2025-01-06': [{ id, title, desc, date }] }

        // ─── CRYPTO (Web Crypto API) ──────────────
        async function deriveKey(password) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
            const salt = enc.encode(SALT);
            return crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                false,
                ['encrypt', 'decrypt']
            );
        }

        async function encryptData(key, plaintext) {
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const enc = new TextEncoder();
            const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(plaintext));
            const combined = new Uint8Array(iv.length + ciphertext.byteLength);
            combined.set(iv);
            combined.set(new Uint8Array(ciphertext), iv.length);
            return btoa(String.fromCharCode(...combined));
        }

        async function decryptData(key, encryptedBase64) {
            const combined = Uint8Array.from(atob(encryptedBase64), c => c.charCodeAt(0));
            const iv = combined.slice(0, 12);
            const ciphertext = combined.slice(12);
            const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
            return new TextDecoder().decode(decrypted);
        }

        // ─── STORAGE ──────────────────────────────
        function getEncryptedPayload() {
            return localStorage.getItem(STORAGE_KEY);
        }

        function setEncryptedPayload(payload) {
            localStorage.setItem(STORAGE_KEY, payload);
        }

        function clearStorage() {
            localStorage.removeItem(STORAGE_KEY);
        }

        async function loadEvents() {
            const payload = getEncryptedPayload();
            if (!payload) {
                events = {};
                return;
            }
            try {
                const json = await decryptData(derivedKey, payload);
                events = JSON.parse(json);
            } catch (e) {
                events = {};
                showToast('Ошибка расшифровки данных');
            }
        }

        async function saveEvents() {
            const json = JSON.stringify(events);
            const encrypted = await encryptData(derivedKey, json);
            setEncryptedPayload(encrypted);
        }

        // ─── HELPERS ──────────────────────────────
        function getMonday(date) {
            const d = new Date(date);
            d.setHours(0,0,0,0);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            d.setDate(diff);
            return d;
        }

        function getWeekNumber(date) {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function formatDateDisplay(dateStr) {
            const parts = dateStr.split('-');
            return `${parts[2]}.${parts[1]}.${parts[0]}`;
        }

        function getWeekKey(monday) {
            const year = monday.getFullYear();
            const week = getWeekNumber(monday);
            return `${year}-W${String(week).padStart(2, '0')}`;
        }

        function getWeekDates(monday) {
            const dates = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(monday);
                d.setDate(d.getDate() + i);
                dates.push(formatDate(d));
            }
            return dates;
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ─── RENDER ───────────────────────────────
        function renderEvents() {
            const weekDates = getWeekDates(currentMonday);
            const weekEvents = [];
            weekDates.forEach(dateStr => {
                if (events[dateStr]) {
                    events[dateStr].forEach(ev => weekEvents.push({ ...ev, date: dateStr }));
                }
            });
            weekEvents.sort((a, b) => a.date.localeCompare(b.date));

            if (weekEvents.length === 0) {
                eventsContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">📝</div>
                        Событий пока нет<br>Добавьте первое
                    </div>`;
            } else {
                eventsContainer.innerHTML = weekEvents.map(ev => `
                    <div class="event-card">
                        <span class="event-date">${formatDateDisplay(ev.date)}</span>
                        <span class="event-title">${escapeHtml(ev.title)}</span>
                        ${ev.desc ? `<span class="event-desc">${escapeHtml(ev.desc)}</span>` : ''}
                        <button class="event-delete" data-id="${ev.id}" data-date="${ev.date}">×</button>
                    </div>
                `).join('');
            }

            weekLabel.textContent = getWeekKey(currentMonday);

            // Attach delete handlers
            document.querySelectorAll('.event-delete').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    const date = btn.dataset.date;
                    events[date] = events[date].filter(ev => ev.id !== id);
                    if (events[date].length === 0) delete events[date];
                    await saveEvents();
                    renderEvents();
                    showToast('Удалено');
                });
            });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ─── NAVIGATION ────────────────────────────
        function goToWeek(offset) {
            currentMonday.setDate(currentMonday.getDate() + offset * 7);
            renderEvents();
        }

        function goToToday() {
            currentMonday = getMonday(new Date());
            renderEvents();
        }

        // ─── AUTH ──────────────────────────────────
        async function attemptLogin(password) {
            try {
                const key = await deriveKey(password);
                // Check if there's existing data
                const payload = getEncryptedPayload();
                if (payload) {
                    try {
                        await decryptData(key, payload);
                    } catch (e) {
                        authError.textContent = 'Неверный пароль';
                        return false;
                    }
                }
                // Success
                derivedKey = key;
                masterPassword = password;
                await loadEvents();
                screenAuth.classList.remove('active');
                screenMain.classList.add('active');
                goToToday();
                passwordInput.value = '';
                authError.textContent = '';
                return true;
            } catch (e) {
                authError.textContent = 'Ошибка. Попробуйте снова.';
                return false;
            }
        }

        async function setupFirstTime(password) {
            derivedKey = await deriveKey(password);
            masterPassword = password;
            events = {};
            await saveEvents();
            screenAuth.classList.remove('active');
            screenMain.classList.add('active');
            goToToday();
            passwordInput.value = '';
            authError.textContent = '';
            showToast('Календарь создан');
        }

        function logout() {
            masterPassword = null;
            derivedKey = null;
            events = {};
            screenMain.classList.remove('active');
            screenAuth.classList.add('active');
            passwordInput.focus();
            btnReset.style.display = 'none';
        }

        // ─── EVENT LISTENERS ──────────────────────
        btnUnlock.addEventListener('click', async () => {
            const password = passwordInput.value.trim();
            if (!password) {
                authError.textContent = 'Введите пароль';
                return;
            }
            const payload = getEncryptedPayload();
            if (!payload) {
                // First time setup
                await setupFirstTime(password);
            } else {
                const success = await attemptLogin(password);
                if (!success) return;
            }
            btnReset.style.display = 'none';
        });

        passwordInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') btnUnlock.click();
        });

        btnReset.addEventListener('click', () => {
            if (confirm('Удалить ВСЕ данные безвозвратно?')) {
                clearStorage();
                logout();
                showToast('Данные удалены');
            }
        });

        btnLogout.addEventListener('click', logout);

        btnPrev.addEventListener('click', () => goToWeek(-1));
        btnNext.addEventListener('click', () => goToWeek(1));
        btnToday.addEventListener('click', goToToday);

        btnAdd.addEventListener('click', () => {
            eventDate.value = formatDate(new Date());
            eventTitle.value = '';
            eventDesc.value = '';
            modalAdd.classList.add('active');
            eventTitle.focus();
        });

        btnCancel.addEventListener('click', () => {
            modalAdd.classList.remove('active');
        });

        modalAdd.addEventListener('click', (e) => {
            if (e.target === modalAdd) modalAdd.classList.remove('active');
        });

        btnSave.addEventListener('click', async () => {
            const date = eventDate.value;
            const title = eventTitle.value.trim();
            const desc = eventDesc.value.trim();
            if (!date || !title) {
                showToast('Дата и заголовок обязательны');
                return;
            }
            if (!events[date]) events[date] = [];
            events[date].push({
                id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
                title,
                desc,
                date
            });
            await saveEvents();
            modalAdd.classList.remove('active');
            renderEvents();
            showToast('Добавлено ✓');
        });

        // ─── INIT ──────────────────────────────────
        passwordInput.focus();

        const payload = getEncryptedPayload();
        if (payload) {
            btnReset.style.display = 'block';
        } else {
            btnReset.style.display = 'none';
            authError.textContent = '';
        }
    })();
</script>
</body>
</html>
