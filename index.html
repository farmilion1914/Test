<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiTrack — учёт логистики</title>
    <style>
        :root {
            --bg: #f6f7f9;
            --card: #ffffff;
            --text: #1a1e25;
            --sub: #6b7280;
            --border: #e5e7eb;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --danger: #ef4444;
            --paid: #10b981;
            --unpaid: #f59e0b;
            --radius: 10px;
            --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 16px;
            max-width: 1300px;
            margin: 0 auto;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        .subtitle {
            color: var(--sub);
            font-size: 13px;
            margin-bottom: 16px;
        }

        .top-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 14px;
        }
        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            letter-spacing: 0.2px;
            transition: all 0.15s;
        }
        .btn-accent { background: var(--accent); color: #fff; }
        .btn-accent:hover { background: var(--accent-hover); }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover { background: #f3f4f6; }
        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 5px 10px;
            font-size: 12px;
        }
        .btn-danger:hover { background: #fef2f2; }
        .btn-sm { padding: 5px 10px; font-size: 11px; }

        .form-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px 18px;
            box-shadow: var(--shadow);
            margin-bottom: 14px;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: flex-end;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex: 1;
            min-width: 90px;
        }
        .field label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: var(--sub);
        }
        .field input, .field select {
            padding: 7px 9px;
            border: 1px solid var(--border);
            border-radius: 7px;
            font-size: 13px;
            font-family: inherit;
            background: #fafafa;
            width: 100%;
        }
        .field input:focus, .field select:focus {
            outline: none;
            border-color: var(--accent);
            background: #fff;
        }
        .field-calc {
            background: #f0f4ff;
            border: 1px dashed #93a8d8;
            border-radius: 7px;
            padding: 7px 9px;
            font-size: 13px;
            font-weight: 600;
            color: #1d4ed8;
            min-width: 90px;
            text-align: right;
        }

        .import-area {
            margin-bottom: 14px;
        }
        .import-area textarea {
            width: 100%;
            height: 70px;
            font-family: 'SF Mono', 'Cascadia Code', monospace;
            font-size: 11px;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            resize: vertical;
            background: #fafafa;
        }
        .import-area textarea:focus { outline: none; border-color: var(--accent); }

        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 10px;
        }
        .filters select, .filters input {
            padding: 6px 8px;
            border: 1px solid var(--border);
            border-radius: 7px;
            font-size: 12px;
            background: #fff;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #f3f4f6;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            border: 1px solid transparent;
        }
        .chip.active { background: #dbeafe; border-color: var(--accent); color: var(--accent); }

        .table-wrap {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            min-width: 1100px;
        }
        th {
            text-align: left;
            padding: 10px 10px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--sub);
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
            position: sticky;
            top: 0;
            background: var(--card);
        }
        td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        tr:hover { background: #f9fafb; }

        .toggle-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f3f4f6;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px 4px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
        }
        .toggle-status:hover { border-color: #93a8d8; }
        .toggle-option {
            padding: 3px 10px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.15s;
        }
        .toggle-option.active-paid {
            background: #10b981;
            color: #fff;
        }
        .toggle-option.active-unpaid {
            background: #f59e0b;
            color: #fff;
        }
        .toggle-option:not(.active-paid):not(.active-unpaid) {
            color: var(--sub);
        }

        .badge-nds { background: #e0e7ff; color: #3730a3; padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 600; display: inline-block; }
        .num { text-align: right; font-variant-numeric: tabular-nums; }
        .unit-price { color: var(--sub); }

        .summary {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .summary-item {
            background: var(--card);
            border-radius: var(--radius);
            padding: 12px 14px;
            box-shadow: var(--shadow);
            flex: 1;
            min-width: 120px;
        }
        .summary-item .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: var(--sub);
            margin-bottom: 2px;
        }
        .summary-item .value {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .summary-item .subvalue {
            font-size: 11px;
            color: var(--sub);
        }
        .empty { text-align: center; color: var(--sub); padding: 40px; font-size: 13px; }
        .month-sep {
            background: #f3f4f6;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--sub);
            padding: 8px 10px !important;
        }
    </style>
</head>
<body>

    <h1>🚚 LogiTrack</h1>
    <p class="subtitle">Учёт логистических отправлений</p>

    <div class="top-bar">
        <button class="btn btn-outline btn-sm" onclick="toggleImport()">📥 Импорт</button>
        <button class="btn btn-outline btn-sm" onclick="exportCSV()">📤 Экспорт CSV</button>
        <button class="btn btn-danger btn-sm" onclick="clearAll()">🗑 Очистить всё</button>
        <span style="font-size:12px;color:var(--sub);margin-left:auto;">Строк: <b id="rowCount">0</b></span>
    </div>

    <div class="import-area" id="importBlock" style="display:none;">
        <textarea id="importText" placeholder="Вставь строки (дата	МП	тип	поставщик	город	кол-во	паллет	сумма	статус	НДС%)"></textarea>
        <button class="btn btn-accent btn-sm" style="margin-top:6px;" onclick="doImport()">Загрузить строки</button>
        <span style="font-size:10px;color:var(--sub);margin-left:8px;">Разделитель — табуляция (копируй прямо из Excel/Google Таблиц)</span>
    </div>

    <div class="form-card">
        <div class="form-row">
            <div class="field"><label>Дата</label><input type="date" id="fDate"></div>
            <div class="field"><label>Маркетплейс</label><select id="fMP"><option>Wildberries</option><option>Ozon</option></select></div>
            <div class="field"><label>Тип</label><select id="fType"><option>FBO</option><option>FBS</option></select></div>
            <div class="field"><label>Поставщик</label><input type="text" id="fSupplier" placeholder="Большие Амбиции"></div>
            <div class="field"><label>Город / Склад</label><input type="text" id="fCity" placeholder="Краснодар"></div>
            <div class="field" style="max-width:80px"><label>Кол-во</label><input type="number" id="fQty" min="1"></div>
            <div class="field" style="max-width:70px"><label>Паллет</label><input type="number" id="fBoxes" min="1"></div>
            <div class="field" style="max-width:100px"><label>Сумма, ₽</label><input type="number" id="fAmount" step="0.01"></div>
            <div class="field" style="max-width:80px"><label>НДС</label><select id="fNDS"><option value="22%">22%</option><option value="7%">7%</option></select></div>
            <div class="field" style="max-width:115px">
                <label>Сумма с НДС</label>
                <div class="field-calc" id="calcFull">0 ₽</div>
            </div>
            <div class="field" style="justify-content:flex-end">
                <button class="btn btn-accent" style="height:34px;" onclick="addEntry()">+ Добавить</button>
            </div>
        </div>
    </div>

    <div class="filters">
        <span style="font-size:11px;color:var(--sub);">Фильтр:</span>
        <input type="month" id="filterMonth" onchange="render()" style="width:130px;">
        <select id="filterStatus" onchange="render()">
            <option value="all">Все статусы</option>
            <option value="paid">Оплачен</option>
            <option value="unpaid">Не оплачен</option>
        </select>
        <select id="filterMP" onchange="render()">
            <option value="all">Все МП</option>
            <option>Wildberries</option>
            <option>Ozon</option>
        </select>
        <span class="chip" onclick="resetFilters()">✕ Сброс</span>
    </div>

    <div class="summary" id="summary"></div>

    <div class="table-wrap" id="tableContainer"><div class="empty">Нет записей</div></div>

    <script>
        const STORAGE_KEY = 'logitrack_v3';
        let entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        let showImport = false;

        document.getElementById('fDate').value = new Date().toISOString().slice(0,10);

        function updateCalc() {
            const amount = parseFloat(document.getElementById('fAmount').value) || 0;
            const nds = document.getElementById('fNDS').value;
            const rate = nds === '22%' ? 1.22 : 1.07;
            const full = Math.round(amount * rate * 100) / 100;
            document.getElementById('calcFull').textContent = full.toLocaleString('ru-RU') + ' ₽';
        }
        document.getElementById('fAmount').addEventListener('input', updateCalc);
        document.getElementById('fNDS').addEventListener('change', updateCalc);

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }

        function addEntry() {
            const date = document.getElementById('fDate').value;
            const marketplace = document.getElementById('fMP').value;
            const type = document.getElementById('fType').value;
            const supplier = document.getElementById('fSupplier').value.trim();
            const city = document.getElementById('fCity').value.trim();
            const qty = parseInt(document.getElementById('fQty').value) || 0;
            const boxes = parseInt(document.getElementById('fBoxes').value) || 0;
            const amount = parseFloat(document.getElementById('fAmount').value) || 0;
            const nds = document.getElementById('fNDS').value;
            const rate = nds === '22%' ? 1.22 : 1.07;
            const amountFull = Math.round(amount * rate * 100) / 100;

            if (!date || !supplier || !city || qty <= 0 || amount <= 0) {
                alert('Заполните обязательные поля: дата, поставщик, город, количество, сумма');
                return;
            }
            entries.push({
                id: Date.now(),
                date, marketplace, type, supplier, city, qty, boxes, amount, amountFull,
                paid: false,
                nds
            });
            save();
            ['fSupplier','fCity','fQty','fBoxes','fAmount'].forEach(id => document.getElementById(id).value = '');
            updateCalc();
        }

        function togglePaid(id) {
            const entry = entries.find(e => e.id === id);
            if (entry) {
                entry.paid = !entry.paid;
                save();
            }
        }

        function deleteEntry(id) {
            if (confirm('Удалить запись?')) {
                entries = entries.filter(e => e.id !== id);
                save();
            }
        }

        function clearAll() {
            if (confirm('Удалить ВСЕ записи безвозвратно?')) {
                entries = [];
                save();
            }
        }

        function toggleImport() {
            showImport = !showImport;
            document.getElementById('importBlock').style.display = showImport ? 'block' : 'none';
        }

        function doImport() {
            const text = document.getElementById('importText').value.trim();
            if (!text) return;
            const lines = text.split('\n').filter(l => l.trim());
            let imported = 0;
            lines.forEach(line => {
                const cols = line.split('\t');
                if (cols.length >= 10) {
                    const qty = parseInt(cols[5].replace(/\s/g,'')) || 0;
                    const amount = parseFloat(cols[7].replace(/[₽\s]/g,'').replace(',','.')) || 0;
                    const nds = cols[9] || '22%';
                    const rate = nds === '22%' ? 1.22 : 1.07;
                    const amountFull = Math.round(amount * rate * 100) / 100;
                    entries.push({
                        id: Date.now() + Math.random(),
                        date: cols[0].split('.').reverse().join('-'),
                        marketplace: cols[1],
                        type: cols[2],
                        supplier: cols[3],
                        city: cols[4],
                        qty,
                        boxes: parseInt(cols[6]) || 0,
                        amount,
                        amountFull,
                        paid: cols[8] === 'Оплачен',
                        nds
                    });
                    imported++;
                }
            });
            save();
            document.getElementById('importText').value = '';
            document.getElementById('importBlock').style.display = 'none';
            showImport = false;
            alert(`Импортировано: ${imported} строк`);
        }

        function exportCSV() {
            let csv = 'Дата\tМаркетплейс\tТип\tПоставщик\tГород\tКол-во\tПаллет\tСумма\tСумма с НДС\tСтатус\tНДС\tЦена/ед\tЦена/ед с НДС\n';
            const sorted = [...entries].sort((a,b) => a.date.localeCompare(b.date));
            sorted.forEach(e => {
                const up = e.qty > 0 ? (e.amount / e.qty) : 0;
                const upf = e.qty > 0 ? (e.amountFull / e.qty) : 0;
                csv += `${e.date.split('-').reverse().join('.')}\t${e.marketplace}\t${e.type}\t${e.supplier}\t${e.city}\t${e.qty}\t${e.boxes}\t${e.amount}\t${e.amountFull}\t${e.paid?'Оплачен':'Не оплачен'}\t${e.nds}\t${up.toFixed(2)}\t${upf.toFixed(2)}\n`;
            });
            const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'logitrack_export.csv'; a.click();
        }

        function resetFilters() {
            document.getElementById('filterMonth').value = '';
            document.getElementById('filterStatus').value = 'all';
            document.getElementById('filterMP').value = 'all';
            render();
        }

        function formatPrice(n) {
            return n.toLocaleString('ru-RU') + ' ₽';
        }

        function getMonthName(d) {
            const months = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
            return months[new Date(d).getMonth()];
        }

        function render() {
            const filterMonth = document.getElementById('filterMonth').value;
            const filterStatus = document.getElementById('filterStatus').value;
            const filterMP = document.getElementById('filterMP').value;

            let filtered = [...entries];
            if (filterMonth) filtered = filtered.filter(e => e.date.startsWith(filterMonth));
            if (filterStatus === 'paid') filtered = filtered.filter(e => e.paid);
            if (filterStatus === 'unpaid') filtered = filtered.filter(e => !e.paid);
            if (filterMP !== 'all') filtered = filtered.filter(e => e.marketplace === filterMP);

            const sorted = filtered.sort((a,b) => a.date.localeCompare(b.date));
            document.getElementById('rowCount').textContent = sorted.length;

            const totalQty = sorted.reduce((s,e) => s + e.qty, 0);
            const totalAmount = sorted.reduce((s,e) => s + e.amount, 0);
            const totalAmountFull = sorted.reduce((s,e) => s + e.amountFull, 0);
            const totalPaid = sorted.filter(e => e.paid).reduce((s,e) => s + e.amountFull, 0);
            const totalUnpaid = sorted.filter(e => !e.paid).reduce((s,e) => s + e.amountFull, 0);
            const avgUnit = totalQty > 0 ? (totalAmount / totalQty) : 0;
            const avgUnitFull = totalQty > 0 ? (totalAmountFull / totalQty) : 0;

            document.getElementById('summary').innerHTML = `
                <div class="summary-item"><div class="label">Отправок</div><div class="value">${sorted.length}</div></div>
                <div class="summary-item"><div class="label">Товаров всего</div><div class="value">${totalQty.toLocaleString('ru-RU')}</div></div>
                <div class="summary-item"><div class="label">Сумма базовая</div><div class="value">${formatPrice(totalAmount)}</div><div class="subvalue">Среднее/ед: ${avgUnit.toFixed(2)} ₽</div></div>
                <div class="summary-item"><div class="label">Сумма с НДС</div><div class="value">${formatPrice(totalAmountFull)}</div><div class="subvalue">Среднее/ед: ${avgUnitFull.toFixed(2)} ₽</div></div>
                <div class="summary-item"><div class="label">Оплачено / Не оплачено</div><div class="value" style="font-size:15px"><span style="color:var(--paid)">${formatPrice(totalPaid)}</span> <span style="color:var(--sub)">/</span> <span style="color:var(--unpaid)">${formatPrice(totalUnpaid)}</span></div></div>
            `;

            if (sorted.length === 0) {
                document.getElementById('tableContainer').innerHTML = '<div class="empty">Нет записей</div>';
                return;
            }

            let html = `<table><thead><tr>
                <th>Дата</th><th>МП</th><th>Тип</th><th>Поставщик</th><th>Город</th>
                <th class="num">Кол-во</th><th class="num">Паллет</th>
                <th class="num">Сумма</th><th class="num">Сумма с НДС</th>
                <th class="num">Цена/ед</th><th class="num">Цена/ед с НДС</th>
                <th>Статус</th><th>НДС</th><th></th>
            </tr></thead><tbody>`;

            let lastMonth = '';
            sorted.forEach(e => {
                const m = getMonthName(e.date + 'T00:00:00');
                if (m !== lastMonth && !filterMonth) {
                    lastMonth = m;
                    html += `<tr><td colspan="14" class="month-sep">📅 ${m} 2026</td></tr>`;
                }
                const up = e.qty > 0 ? (e.amount / e.qty) : 0;
                const upf = e.qty > 0 ? (e.amountFull / e.qty) : 0;
                html += `<tr>
                    <td>${e.date.split('-').reverse().join('.')}</td>
                    <td>${e.marketplace}</td>
                    <td>${e.type}</td>
                    <td>${e.supplier}</td>
                    <td>${e.city}</td>
                    <td class="num">${e.qty.toLocaleString('ru-RU')}</td>
                    <td class="num">${e.boxes}</td>
                    <td class="num">${formatPrice(e.amount)}</td>
                    <td class="num">${formatPrice(e.amountFull)}</td>
                    <td class="num unit-price">${up.toFixed(2)} ₽</td>
                    <td class="num unit-price">${upf.toFixed(2)} ₽</td>
                    <td>
                        <div class="toggle-status" onclick="togglePaid(${e.id})" title="Нажми чтобы переключить">
                            <span class="toggle-option ${e.paid ? 'active-paid' : ''}">Оплачен</span>
                            <span class="toggle-option ${!e.paid ? 'active-unpaid' : ''}">Не оплачен</span>
                        </div>
                    </td>
                    <td><span class="badge-nds">${e.nds}</span></td>
                    <td><button class="btn btn-danger btn-sm" onclick="deleteEntry(${e.id})">✕</button></td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('tableContainer').innerHTML = html;
        }

        document.querySelectorAll('.form-card input').forEach(i => i.addEventListener('keydown', e => { if (e.key==='Enter') addEntry(); }));
        updateCalc();
        render();
    </script>
</body>
</html>
